get:
  operationId: playerTopNbPerfType
  summary: Get one leaderboard
  tags:
    - Users
  security: []
  description: |
    Get the leaderboard for a single speed or variant (a.k.a. `perfType`).
    There is no leaderboard for correspondence or puzzles.
    See <https://lichess.org/player/top/100/bullet>.
  parameters:
    - in: path
      name: nb
      description: The number of users to get, from the 100 users on the leaderboard page of interest (see the `page` query param)
      schema:
        type: integer
        minimum: 1
        maximum: 100
        example: 100
      required: true
    - in: path
      name: perfType
      description: The speed or variant
      schema:
        type: string
        example: bullet
        enum:
          - ultraBullet
          - bullet
          - blitz
          - rapid
          - classical
          - chess960
          - crazyhouse
          - antichess
          - atomic
          - horde
          - kingOfTheHill
          - racingKings
          - threeCheck
      required: true
    - in: query
      name: page
      description: The leaderboard page of interest (e.g., page 2 contains the top 101-200 players)
      schema:
        type: integer
        minimum: 1
        maximum: 20
        default: 1
        example: 1
      required: false
  responses:
    "200":
      description: The list of top players for the variant.
      headers:
        Access-Control-Allow-Origin:
          schema:
            type: string
            default: "'*'"
      content:
        application/vnd.lichess.v3+json:
          schema:
            $ref: "../../schemas/Leaderboard.yaml"
          examples:
            default:
              $ref: "../../examples/users-getOneLeaderboard.json.yaml"
