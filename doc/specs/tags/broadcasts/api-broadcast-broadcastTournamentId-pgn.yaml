get:
  operationId: broadcastAllRoundsPgn
  summary: Export all rounds as PGN
  description: |
    Download all games of all rounds of a broadcast in PGN format.
    If a `study:read` [OAuth token](#tag/OAuth) is provided,
    the private rounds where the user is a contributor will be available.
    You may want to [download only the games of a single round](#tag/broadcasts/GET/api/broadcast/round/{broadcastRoundId}.pgn) instead.
  tags:
    - Broadcasts
  security:
    - OAuth2: ["study:read"]
  parameters:
    - in: path
      name: broadcastTournamentId
      description: The broadcast tournament ID
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 8
    - in: query
      name: clocks
      description: |
        Include clock comments in the PGN moves, when available.
        Example: `2. exd5 { [%clk 1:01:27] } e5 { [%clk 1:01:28] }`
      schema:
        type: boolean
        default: true
    - in: query
      name: comments
      description: |
        Include analysis comments in the PGN moves, when available.
        Example: `12. Bxf6 { [%eval 0.23] }`
      schema:
        type: boolean
        default: true
  responses:
    "200":
      description: The PGN representation of the broadcast.
      headers:
        Access-Control-Allow-Origin:
          schema:
            type: string
            default: "'*'"
      content:
        application/x-chess-pgn:
          schema:
            $ref: "../../schemas/StudyPgn.yaml"
          examples:
            pgn:
              $ref: "../../examples/broadcasts-exportAllRoundsAsPgn.pgn.yaml"
