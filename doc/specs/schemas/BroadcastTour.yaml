type: object

properties:
  id:
    type: string
  name:
    type: string
  slug:
    type: string
  createdAt:
    type: integer
    example: 1722169800000
  dates:
    type: array
    items:
      type: integer
      format: int64
    description: "Start and end dates of the tournament, as Unix timestamps in milliseconds"
    minItems: 1
    maxItems: 2
    example: [1722169800000, 1722666600000]
  info:
    $ref: "./BroadcastTourInfo.yaml"
  tier:
    type: integer
    description: "Used to designate featured tournaments on Lichess"
  image:
    type: string
    format: uri
  description:
    type: string
    description: "Full tournament description in markdown format, or in HTML if the html=1 query parameter is set."
  teamTable:
    type: boolean
  showTeamScores:
    type: boolean
  url:
    type: string
    format: uri
  communityOwner:
    $ref: "./LightUser.yaml"

required:
  - id
  - name
  - slug
  - createdAt
  - url
