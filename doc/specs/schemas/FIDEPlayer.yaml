type: object

properties:
  id:
    type: integer
  name:
    type: string
  title:
    $ref: "./Title.yaml"
  federation:
    type: string
  year:
    type: [integer, "null"]
  inactive:
    type: integer
  standard:
    type: integer
  rapid:
    type: integer
  blitz:
    type: integer
  gender:
    type: string
    description: FIDE uses mandatory binary gender.
    enum:
      - M
      - F
  photo:
    $ref: "./FIDEPlayerPhoto.yaml"

required:
  - id
  - name
  - federation
